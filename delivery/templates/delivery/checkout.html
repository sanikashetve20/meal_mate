<!doctype html>
{% extends 'delivery/base.html' %}
{% load static %}

{% block title %}Checkout - Meal-Mate{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="meal-card animate-up p-5 text-center shadow-lg" style="max-width: 500px; width: 100%;">
        <img src="{% static 'delivery/images/meal_mate.png' %}" alt="Meal-Mate" class="mb-3" style="height: 70px;">
        <h2 class="fw-bold">Confirm & <span class="text-coral">Pay</span></h2>
        <p class="text-muted mb-4">You're just one step away from your magical meal!</p>

        <div class="bg-light rounded-4 p-4 mb-4 border">
            <span class="text-uppercase small fw-bold text-muted d-block mb-1">Total Payable Amount</span>
            <span class="display-5 fw-extrabold text-dark">₹{{ total_price }}</span>
            <div class="mt-2 small text-success fw-bold">
                <i class="bi bi-shield-check"></i> Secure SSL Encryption
            </div>
        </div>

        <button id="rzp-button1" class="btn btn-coral w-100 py-3 fw-bold rounded-pill shadow mb-3">
            <i class="bi bi-credit-card-2-front me-2"></i> PAY SECURELY NOW
        </button>

        <div class="d-flex justify-content-center align-items-center gap-3 mt-2">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Razorpay_logo.svg" alt="Razorpay" height="15" style="opacity: 0.6;">
        </div>

        <hr class="my-4">
        
        <a href="{% url 'show_cart_page' username %}" class="text-muted small text-decoration-none fw-medium">
            <i class="bi bi-arrow-left"></i> Cancel and go back
        </a>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key_id }}", 
        "amount": "{{ amount_paise }}", 
        "currency": "INR",
        "name": "Meal-Mate",
        "description": "Food Order Payment #{{ order_id }}",
        "image": "{% static 'delivery/images/meal_mate.png' %}",
        "order_id": "{{ order_id }}", 
        "handler": function (response){
            // On success, redirect to the orders page
            window.location.href = "{% url 'view_orders' username %}";
        },
        "prefill": {
            "name": "{{ username }}",
        },
        "theme": {
            "color": "#ff7675"
        }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
