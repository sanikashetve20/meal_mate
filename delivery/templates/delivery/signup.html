<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Meal-Mate</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Meal - Mate</h1>
        </div>

        <div class="main-content">
            <div class="card">
                <form method="post" action="{% url 'handle_register' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">USERNAME</label>
                        <input type="text" id="username" name="username"
                               pattern="[A-Za-z0-9_]{3,15}" placeholder="Enter Username"
                               required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password"
                               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" placeholder="Enter Password"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="address">ADDRESS</label>
                        <input type="text" id="address" name="address" placeholder="Enter your address"
                               minlength="10" required>
                    </div>

                    <div class="form-group">
                        <label for="mobile">MOBILE</label>
                        <input type="tel" id="mobile" name="mobile" placeholder="10-digit number"
                               pattern="[6-9][0-9]{9}" maxlength="10" required>
                    </div>

                    <button type="submit">SIGN UP</button>
                </form>

                <div class="switch-auth">
                    Already have an account? <a href="{% url 'signin' %}">Sign In</a>
                </div>
            </div>
        </div>

        <div class="footer-link">
            <a href="{% url 'index' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
