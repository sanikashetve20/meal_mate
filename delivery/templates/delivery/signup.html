<!doctype html>
{% extends 'delivery/base.html' %}
{% load static %}

{% block title %}Sign Up - Meal-Mate{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-7 col-lg-5">
            <div class="meal-card animate-up p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold h2">Join the <span class="text-coral">Feast</span></h1>
                    <p class="text-muted">Create your magical account today</p>
                </div>

                <form method="post" action="{% url 'handle_register' %}">
                    {% csrf_token %}
                    
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-3" id="username" name="username" 
                                       placeholder="Username" pattern="[A-Za-z0-9_]{3,15}" required autofocus>
                                <label for="username">Username</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-3" id="password" name="password" 
                                       placeholder="Password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                                       title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
                                <label for="password">Password</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control rounded-3" id="email" name="email" 
                               placeholder="example@gmail.com" required>
                        <label for="email">Email address</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="address" name="address" 
                               placeholder="Address" minlength="10" required>
                        <label for="address">Full Address</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="tel" class="form-control rounded-3" id="mobile" name="mobile" 
                               placeholder="Mobile" pattern="[6-9][0-9]{9}" maxlength="10" required>
                        <label for="mobile">Mobile Number</label>
                    </div>

                    <button type="submit" class="btn btn-coral w-100 py-3 fw-bold rounded-3 mb-3">
                        CREATE ACCOUNT
                    </button>
                </form>

                <div class="text-center small mt-2">
                    Already have an account? <a href="{% url 'signin' %}" class="text-coral fw-bold text-decoration-none">Sign In</a>
                </div>
            </div>

            <div class="text-center mt-4 mb-5">
                <a href="{% url 'index' %}" class="text-dark small text-decoration-none">← Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
