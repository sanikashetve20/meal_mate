<!doctype html>
{% extends 'delivery/base.html' %}
{% load static %}

{% block title %}Sign In - Meal-Mate{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-6 col-lg-4">
            <div class="meal-card animate-up p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold h2">Welcome <span class="text-coral">Back!</span></h1>
                    <p class="text-muted">Log in to your Wizard account</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
                {% endif %}

                <form method="post" action="{% url 'handle_login' %}">
                    {% csrf_token %}
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="username" name="username" 
                               placeholder="Username" pattern="[A-Za-z0-9_]{3,15}" required autofocus>
                        <label for="username">Username</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control rounded-3" id="password" name="password" 
                               placeholder="Password" pattern=".{6,}" required>
                        <label for="password">Password</label>
                    </div>

                    <button type="submit" class="btn btn-coral w-100 py-3 fw-bold rounded-3 mb-3">
                        SIGN IN
                    </button>
                </form>

                <div class="text-center small mt-2">
                    Don't have an account? <a href="{% url 'signup' %}" class="text-coral fw-bold text-decoration-none">Sign Up</a>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="{% url 'index' %}" class="text-dark small text-decoration-none">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
